# dxmt.conf — opinionated DXMT defaults for EverQuest Legends on Apple Silicon.
# DXMT reads $PWD/dxmt.conf; osxEQL's launcher cd's into the game dir before
# launch, so this file belongs next to eqgame.exe in the EQ Legends install dir.
# install-config.sh copies it there (or stages it under qol/staged/ until the
# game exists, then install.sh copies it on the next run — "copy-on-present").
#
# Format: plain "key = value", one per line; '#' starts a comment. DXMT re-reads
# this file at each launch (no live reload) — relaunch after editing.
#
# Every uncommented value here is a safe default. Situational keys are left
# COMMENTED — turn one on only in response to its specific symptom.
#
# NOTE: there is deliberately NO gamma/brightness key here — DXMT has none.
# The darkness lever on this DX11 client is in-game Options > Display > Advanced
# ("Enhanced Vision" / "Advanced Lighting") plus macOS display brightness.
# See helpers/brightness.md and docs/CONFIG.md.

# Metal/CoreAnimation frame pacing. This is NOT a busy-loop cap: it can only hit
# refresh-rate divisors, so pick a clean divisor of your panel (60 or 30; 120/60
# on a 120 Hz display). 0 = uncapped. 60 keeps a fanless Mac cool.
d3d11.preferredMaxFrameRate = 60

# Shader Metal version: 310 = Metal 3.1 (macOS 14), 320 = Metal 3.2 (macOS 15+).
# macOS 26 supports 3.2. Omit the line to let DXMT auto-pick the newest supported.
dxmt.shaderMetalVersion = 320

# Let DXMT handle cmd/alt+tab inside the Wine virtual desktop (Wine can't natively).
dxgi.handleAltTab = True

# ---- situational (leave commented unless you hit the specific symptom) ------

# Cap the D3D feature level. EQ is an old D3D11 engine; if you see 12_x-path
# glitches, capping to 11_1 (or 11_0) can stabilize it. Uncomment for stability.
# d3d11.maxFeatureLevel = 11_1

# Split fma into mul+add. Only if you see shimmering/precision artifacts.
# d3d11.defuseFma = True

# Only if the client throws DXGI_ERROR_WAS_STILL_DRAWING / hitches on Map.
# d3d11.ignoreMapFlagNoWait = True

# MetalFX spatial upscaling: render low, upscale for FPS. INERT unless you ALSO
# export DXMT_METALFX_SPATIAL_SWAPCHAIN=1 in the launcher env (see docs/CONFIG.md).
# d3d11.metalSpatialUpscaleFactor = 1.5
